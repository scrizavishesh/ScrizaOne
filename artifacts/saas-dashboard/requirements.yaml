packages:
  "@reduxjs/toolkit": "Global state management as requested"
  "react-redux": "React bindings for Redux"
  "axios": "API client with interceptors"
  "recharts": "Dashboard analytics charts and data visualization"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod validation resolver for forms"
  "framer-motion": "Animations and layout transitions"
  "date-fns": "Date formatting for chat and tables"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes without style conflicts"

images:
  - path: "artifacts/saas-dashboard/public/images/auth-bg.png"
    description: "Abstract soft gradient mesh background in indigo, violet, and white. Clean, minimal, corporate SaaS aesthetic."
    aspect_ratio: "16:9"
  - path: "artifacts/saas-dashboard/public/images/logo.png"
    description: "Minimal modern geometric logo mark for a SaaS company named 'SocialOne', indigo blue on transparent background"
    aspect_ratio: "1:1"

notes:
  - The API URL https://test.edu2all.in/scz/ is HTTP, which may cause Mixed Content warnings if the dashboard is served over HTTPS. The UI includes fallback mock states and graceful error handling for this scenario.
  - Redux is used for global state sync, while TanStack Query handles server state and caching.
