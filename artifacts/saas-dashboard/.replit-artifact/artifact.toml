kind = "web"
previewPath = "/"
title = "SaaS Admin Dashboard"
version = "1.0.0"
id = "artifacts/saas-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25543
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/saas-dashboard run dev"

[services.env]
PORT = "25543"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/saas-dashboard", "run", "build"]
publicDir = "artifacts/saas-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
